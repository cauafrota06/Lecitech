<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecitech - Login</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght=300;400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../estilos/login.css">
</head>
<body>

    <img src="lecita.png" alt="Logótipo Escola Lecita" class="logo-escola">

    <div class="login-container">
        <h1 class="logo">LECITECH</h1>
        
        <form id="form-login" class="form-box active">
            <h2>Acesse o Painel</h2>
            <div class="input-group">
                <input type="email" id="email-login" placeholder="Seu e-mail" required>
            </div>
            <div class="input-group">
                <input type="password" id="senha-login" placeholder="Sua senha" required>
            </div>
            <button type="submit" class="btn-ciano">Entrar</button>
            <p class="trocar-tela">Não tem uma conta? <span id="btn-ir-cadastro">Cadastre-se</span></p>
        </form>

        <form id="form-cadastro" class="form-box">
            <h2>Criar Conta</h2>
            <div class="input-group">
                <input type="email" id="email-cadastro" placeholder="Novo e-mail" required>
            </div>
            <div class="input-group">
                <input type="password" id="senha-cadastro" placeholder="Crie uma senha (mínimo 6 caracteres)" required>
            </div>
            <button type="submit" class="btn-ciano">Cadastrar</button>
            <p class="trocar-tela">Não tem uma conta? <a href="../telas/cadastro.html">Cadastre-se</a></p>
        </form>
    </div>

    <script type="module" src="../scripts/auth.js"></script>
</body>
</html>
