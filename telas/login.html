<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecitech - Login</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght=300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../estilos/login.css">
</head>
<body>

    <img src="lecita.png" alt="Logótipo Escola Lecita" class="logo-escola">

    <div class="login-container">
        <h1 class="logo">LECITECH</h1>
        
        <form id="form-login" class="form-box active">
            <h2>Acessar a estação</h2>
            <div class="input-group">
                <input type="email" id="email-login" placeholder="Seu e-mail" required>
            </div>
            <div class="input-group senha-group">
                <input type="password" id="senha-login" placeholder="Sua senha" required>
                <span id="olho-senha" class="olho-icon" title="Segure para ver a senha">👁️</span>
            </div>
            <button type="submit" class="btn-ciano">Entrar</button>

            <p class="esqueci-senha-box"><a href="recuperar.html">Esqueci minha senha</a></p>
            
            <p class="trocar-tela">Não tem uma conta? <a href="cadastro.html">Cadastre-se</a></p>
        </form>
    </div>

    <script type="module" src="../scripts/login.js"></script>
</body>
</html>
