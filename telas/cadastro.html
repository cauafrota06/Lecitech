<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecitech - Cadastro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght=300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../estilos/cadastro.css">
</head>
<body>

    <img src="../imagens/lecita.png" alt="Logótipo Escola Lecita" class="logo-escola">

    <div class="login-container">
        <h1 class="logo">LECITECH</h1>
        
        <form id="form-cadastro" class="form-box active">
            <h2>Criar Nova Conta</h2>
            <div class="input-group">
                <input type="email" id="email-cadastro" placeholder="Novo e-mail" required>
            </div>
            <div class="input-group">
                <input type="password" id="senha-cadastro" placeholder="Crie uma senha (mínimo 6 caracteres)" required>
            </div>
            <button type="submit" class="btn-ciano">Cadastrar no Banco</button>
            
            <p class="trocar-tela">Já tem uma conta? <a href="login.html">Faça Login aqui</a></p>
        </form>
    </div>

    <script type="module" src="../scripts/cadastro.js"></script>
</body>
</html>
