<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecitech - Recuperar Senha</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght=300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../estilos/login.css">
</head>
<body>

    <img src="../imagens/lecita.png" alt="Logótipo Escola Lecita" class="logo-escola">

    <div class="login-container">
        <h1 class="logo">LECITECH</h1>
        
        <form id="form-recuperar" class="form-box active">
            <h2>Redefinir Senha</h2>
            <p style="color: #9ba6b5; font-size: 0.9rem; margin-bottom: 20px;">
                Digite seu e-mail abaixo e enviaremos um link para você criar uma nova senha.
            </p>
            
            <div class="input-group">
                <input type="email" id="email-recuperar" placeholder="Seu e-mail cadastrado" required>
            </div>
            
            <button type="submit" class="btn-ciano">Enviar E-mail de Recuperação</button>
            
            <p class="trocar-tela" style="margin-top: 25px;">
                Lembrou a senha? <a href="login.html">Voltar ao Login</a>
            </p>
        </form>
    </div>

    <script type="module" src="../scripts/recuperar.js"></script>
</body>
</html>
