<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Meteorológico</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght=300;400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../estilos/styles.css">
</head>

<body>

    <div class="container">
        <div class="topo">
            <div>
                <h1>Painel Meteorológico</h1>
            </div>
            
            <div class="relogio">
                <div id="hora">--:--:--</div>
                <div id="data">--/--/----</div>
                <div class="local">Manaus - AM</div>
            </div>
        </div>

        <div class="cards">
            <div class="card">
                <div class="icone">🌡️</div>
                <div class="titulo">Temperatura</div>
                <div class="valor">
                    <span id="temperatura">--</span> °C
                </div>
            </div>

            <div class="card">
                <div class="icone">💧</div>
                <div class="titulo">Umidade</div>
                <div class="valor">
                    <span id="umidade">--</span> %
                </div>
            </div>

            <div class="card">
                <div class="icone">🎈</div>
                <div class="titulo">Pressão</div>
                <div class="valor">
                    <span id="pressao">--</span> hPa
                </div>
            </div>

            <div class="card">
                <div class="icone">🛢️</div>
                <div class="titulo">Nível de CO2</div>
                <div class="valor">
                    <span id="co2">--</span> ppm
                </div>
            </div>

            <div class="card">
                <div class="icone">⚠️</div>
                <div class="titulo">Nível de NH3</div>
                <div class="valor">
                    <span id="nh3">--</span> ppm
                </div>
            </div>

            <div class="card">
                <div class="icone">💨</div>
                <div class="titulo">Velocidade do Ar</div>
                <div class="valor">
                    <span id="vento">--</span> km/h
                </div>
            </div>

            <div class="card">
                <div class="icone">🌧️</div>
                <div class="titulo">Chuva Acumulada</div>
                <div class="valor">
                    <span id="chuva">--</span> mm
                </div>
            </div>

            <div class="card">
                <div class="icone">🍃</div>
                <div class="titulo">Qualidade do Ar</div>
                <div class="valor">
                    <span id="qualidadeAr">--</span>
                </div>
            </div>
        </div>

        <footer>
            Sincronização em tempo real via Firebase Realtime Database
        </footer>
    </div>

    <script type="module" src="script.js"></script>

</body>
</html>
